name: Build APK

# Builds a debug APK in the cloud on every push and on manual trigger.
# Download the APK from the run's "Artifacts" section, then install on an Android phone.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.3'
          cache: true

      - name: Generate Android platform files
        run: flutter create --platforms=android --project-name petrolpump_app .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (compile check — reports issues, does not block the build)
        run: flutter analyze
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: petrolpump-owner-app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
